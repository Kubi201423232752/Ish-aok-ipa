name: Build iSH-AOK from ZIP
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip source
        run: unzip "ish-AOK-508.zip"

      - name: Auto find and move files
        run: |
          DIR=$(find . -type d -name "iSH*" | head -1)
          if [ -n "$DIR" ]; then
            mv "$DIR"/* .
            rm -rf "$DIR"
          fi

      - name: Install deps
        run: brew install meson ninja llvm

      - name: Build
        run: |
          meson build
          cd build
          ninja
          cd ..

      - name: Make IPA
        run: |
          mkdir -p Payload
          find . -name "*.app" -exec cp -r {} Payload/ \;
          zip -r iSH-AOK.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: iSH-AOK.ipa
          path: iSH-AOK.ipa
