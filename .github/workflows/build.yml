name: Build iSH-AOK from ZIP
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip source
        run: unzip "ish-AOK-508.zip"

      - name: Move files
        run: |
          find . -type d -name "iSH*" -exec mv {}/* . \;
          find . -type d -name "iSH*" -exec rm -rf {} \;

      - name: Install dependencies
        run: brew install meson ninja llvm

      - name: Prepare submodules
        run: git submodule update --init --recursive || true

      - name: Build library
        run: |
          meson build
          cd build
          ninja
          cd ..

      - name: Build app
        run: xcodebuild -project ish-AOK.xcodeproj -scheme ish-AOK -configuration Release -derivedDataPath build || true

      - name: Package IPA
        run: |
          mkdir -p Payload
          find . -name "*.app" -exec cp -r {} Payload/ \;
          zip -r iSH-AOK.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iSH-AOK.ipa
          path: iSH-AOK.ipa
